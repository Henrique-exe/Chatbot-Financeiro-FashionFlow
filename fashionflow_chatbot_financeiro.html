<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chatbot de atendimento FashionFlow — setor financeiro</title>
  <link rel="stylesheet" href="style.css" />

</head>

<body>
  <h2 class="sr-only">Chatbot de atendimento FashionFlow — setor financeiro</h2>
  <div id="app">
    <div id="header">
      <div class="avatar">💳</div>
      <div class="info">
        <div class="name">FashionFlow Financeiro</div>
        <div class="status">● Online agora</div>
      </div>
    </div>
    <div id="messages"></div>
    <div id="footer">
      <input id="input" type="text" placeholder="Digite sua mensagem..." autocomplete="off" />
      <button id="send-btn" aria-label="Enviar">📤</button>
    </div>
  </div>

  <script src="script.js"></script>
